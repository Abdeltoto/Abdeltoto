<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Abdel Atia - AI Architect, PhD, DMV">
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="18%"  stop-color="#e2e8f0"/>
      <stop offset="38%"  stop-color="#94a3b8"/>
      <stop offset="50%"  stop-color="#1e293b"/>
      <stop offset="62%"  stop-color="#94a3b8"/>
      <stop offset="82%"  stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <linearGradient id="chromeHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="45%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.4"/>
    </linearGradient>

    <linearGradient id="iridescent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FF6B6B" stop-opacity="0.45"/>
      <stop offset="33%"  stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="66%"  stop-color="#00D9FF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2ea44f" stop-opacity="0.45"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00D9FF"/>
      <stop offset="50%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>

    <linearGradient id="frameLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF6B6B" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#FF6B6B" stop-opacity="0.85"/>
      <stop offset="40%"  stop-color="#8B5CF6"/>
      <stop offset="60%"  stop-color="#00D9FF"/>
      <stop offset="85%"  stop-color="#2ea44f" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFD21E" stop-opacity="0"/>
    </linearGradient>

    <filter id="lift" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <line x1="60" y1="50" x2="1140" y2="50" stroke="url(#frameLine)" stroke-width="1"/>
  <line x1="60" y1="53" x2="1140" y2="53" stroke="url(#frameLine)" stroke-width="0.6" opacity="0.55"/>

  <path d="M 60 85 L 60 50 L 95 50"        fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <path d="M 1140 85 L 1140 50 L 1105 50"  fill="none" stroke="#FFD21E" stroke-width="2"/>
  <path d="M 60 195 L 60 230 L 95 230"     fill="none" stroke="#8B5CF6" stroke-width="2"/>
  <path d="M 1140 195 L 1140 230 L 1105 230" fill="none" stroke="#00D9FF" stroke-width="2"/>

  <g filter="url(#lift)">
    <text x="600" y="150" font-family="Helvetica, Arial, sans-serif" font-size="92"
          font-weight="900" letter-spacing="6" text-anchor="middle"
          fill="url(#chrome)" stroke="#0f172a" stroke-width="1">
      ABDEL ATIA
    </text>
    <text x="600" y="150" font-family="Helvetica, Arial, sans-serif" font-size="92"
          font-weight="900" letter-spacing="6" text-anchor="middle"
          fill="url(#iridescent)" opacity="0.4">
      ABDEL ATIA
    </text>
    <text x="600" y="150" font-family="Helvetica, Arial, sans-serif" font-size="92"
          font-weight="900" letter-spacing="6" text-anchor="middle"
          fill="url(#chromeHighlight)" opacity="0.6">
      ABDEL ATIA
    </text>
  </g>

  <text x="600" y="195" font-family="Helvetica, Arial, sans-serif" font-size="20"
        font-weight="600" letter-spacing="8" text-anchor="middle"
        fill="url(#accent)">
    AI ARCHITECT  &#183;  PhD  &#183;  DMV
  </text>

  <line x1="60" y1="230" x2="1140" y2="230" stroke="url(#frameLine)" stroke-width="1"/>
  <line x1="60" y1="233" x2="1140" y2="233" stroke="url(#frameLine)" stroke-width="0.6" opacity="0.55"/>
</svg>
