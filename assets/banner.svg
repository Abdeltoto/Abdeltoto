<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Abdel Atia - vet, PhD, code, chaos">
  <defs>
