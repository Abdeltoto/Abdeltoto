    <circle cx="57" cy="56" r="2.5" fill="#ffffff"/>
    <circle cx="87" cy="56" r="2.5" fill="#ffffff"/>
    <path d="M52 82 Q70 96 88 82" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
